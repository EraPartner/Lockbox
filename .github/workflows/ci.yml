name: CI

# Guards the security-critical shell + container definitions. These checks are
# SELF-CONTAINED: they never touch the sibling fleet repos (Vision/Watchman/…),
# which aren't checked out here — so `sync.sh --check` (which needs all six
# targets) is intentionally NOT run in CI; the local .githooks/pre-commit covers
# fleet drift on the machine that owns the fleet. CI covers what one checkout can
# prove: scripts parse + lint clean, no secrets are baked in (audit.sh regex
# scan + a gitleaks backstop), the in-repo vendored copies match their canonical
# sources, and no Dockerfile misconfigs slip in (Trivy). Workflow security
# (script injection, unpinned actions) is covered by CodeQL in codeql.yml —
# the only CodeQL-analyzable surface here, since shell has no analyzer.
#
# Hardening posture mirrors the fleet CI standard: deny-all default permissions
# with per-job least privilege, pinned action SHAs, pinned runner image, per-job
# timeouts, and a single aggregated "CI Complete" required status check.

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  # pull_request deliberately has NO paths-ignore. With "CI Complete" as a required
  # status check, a docs-only PR that skipped the whole workflow would never produce
  # that check and would sit permanently "Expected — Waiting", blocking merge.
  # Running full CI on a docs-only PR is cheap by comparison. `branches: [main]`
  # matches codeql.yml so CI and CodeQL cover the same PR scope.
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan (Trivy misconfig + gitleaks) against updated policy/rule DBs
    # even when the repo is dormant. Monday 04:00 UTC, staggered from CodeQL (03:00).
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default; each job opts in to only what it needs.
permissions: {}

jobs:
  shell:
    name: shell scripts (syntax + shellcheck)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: bash -n (parse check)
        run: |
          set -euo pipefail
          # Every tracked file with a bash/sh shebang.
          mapfile -t files < <(git ls-files | while read -r f; do
            [[ -f "$f" ]] && head -1 "$f" | grep -qE '^#!.*\b(bash|sh)\b' && echo "$f"
          done)
          printf 'checking: %s\n' "${files[@]}"
          rc=0
          for f in "${files[@]}"; do bash -n "$f" || rc=1; done
          exit "$rc"
      - name: shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: -s bash -e SC1090,SC1091
        with:
          # Follow-source is off (SC1090/91 disabled) because launcher-common.sh
          # is sourced by path at runtime, not resolvable at lint time.
          severity: warning

  secrets:
    name: leak audit (no baked secrets)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: audit.sh
        run: ./audit.sh

  # gitleaks backstop — a second, broader secrets scan over the push/PR diff
  # range, independent of audit.sh's repo-specific regexes. Mirrors the fleet
  # (Vision/Watchman/VaultLens all run gitleaks in CI); audit.sh stays as the
  # canonical, hook-enforced scan.
  secrets-scan:
    name: leak audit (gitleaks backstop)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vendored:
    name: in-repo vendored copies + generated allowlist match canonical
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: sync.sh --check (self-only)
        # EGRESS_SELF_ONLY restricts the target list to THIS repo's sandbox/.devcontainer
        # (the sibling fleet repos aren't checked out here). Unlike the old hand-rolled
        # cmp loop, this ALSO regenerates + compares the sandbox allowlist.txt via the
        # same gen_allowlist sync uses — so a base-allowlist.txt edit that wasn't
        # re-synced is caught, not just the three verbatim files. The vendored file
        # list comes from vendored-files.txt (single source, shared with sync.sh).
        run: EGRESS_SELF_ONLY=1 ./sync.sh --check

  dockerfile:
    name: dockerfile lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: sandbox/.devcontainer/Dockerfile
          # DL3008 (pin apt versions) is a deliberate tradeoff here — the image
          # is rebuilt+re-pinned via binary-pins.txt, not apt version pins.
          ignore: DL3008
          failure-threshold: error

  squid:
    name: squid.conf syntax (squid -k parse)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: squid -k parse
        # squid.conf isn't shell, so the shell job ignores it; validate its directive
        # syntax here so a semantically-broken proxy config fails CI instead of only
        # at container start. squid resolves the ACL file + tls-cert paths at parse
        # time, so stage stub copies at the absolute paths squid.conf references.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends squid-openssl openssl
          sudo install -d /etc/squid/certs /var/lib/squid /var/log/squid /var/spool/squid
          sudo cp squid.conf /etc/squid/squid.conf
          sudo cp sandbox/.devcontainer/allowlist.txt /etc/squid/allowlist.txt
          openssl req -x509 -newkey rsa:2048 -days 1 -nodes \
            -subj "/CN=ci-squid-parse" -keyout /tmp/k.pem -out /tmp/c.pem >/dev/null 2>&1
          sudo bash -c 'cat /tmp/k.pem /tmp/c.pem > /etc/squid/certs/bump.pem'
          sudo /usr/lib/squid/security_file_certgen -c -s /var/lib/squid/ssl_db -M 4MB
          sudo chown -R proxy:proxy /etc/squid/certs /var/lib/squid /var/log/squid /var/spool/squid
          sudo squid -k parse

  docker-build:
    name: devcontainer image builds
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - name: docker build (no push)
        # hadolint + Trivy lint/scan the Dockerfile but never BUILD it; a Dockerfile
        # that lints clean but fails `docker build` (bad apt package, broken pin,
        # unreachable base/release URL) would otherwise merge and only break on the
        # next developer rebuild. Build the image (no push) to catch that in CI.
        run: docker build -t dev-sandbox:ci sandbox/.devcontainer

  # ─────────────────────────────────────────────────────────────────────────────
  # Trivy — Dockerfile / IaC misconfiguration scan (HIGH/CRITICAL). The `misconfig`
  # scanner is the whole point here: the canonical devcontainer Dockerfile IS this
  # repo's product, and hadolint only covers a subset of what Trivy's policy set
  # flags. The `vuln` scanner is deliberately OFF — no lockfile or dependency
  # manifest ships in this repo, so it would scan nothing (enabling it "for later"
  # is exactly the inert default we don't want). SARIF is uploaded to the Security
  # tab so findings are tracked even when the gating (table) step is green.
  # ─────────────────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write # required to upload SARIF to GitHub Security
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Run Trivy scan (table — fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Run Trivy scan (SARIF — upload to GitHub Security)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: misconfig
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ─────────────────────────────────────────────────────────────────────────────
  # Quality Gate — every check above must pass. Aggregates results so a failure
  # in any job surfaces as one status.
  # ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # INVARIANT: every job above (except ci-complete) MUST be listed here. A job
    # that runs but is omitted from `needs` can fail while this gate stays green —
    # so when you add a job, add it to this list too.
    needs:
      - shell
      - secrets
      - secrets-scan
      - vendored
      - dockerfile
      - squid
      - docker-build
      - trivy-scan
    if: always()
    steps:
      - name: Check all gates passed
        run: |
          results='${{ toJson(needs.*.result) }}'
          # `skipped` counts as a failure too: a required job that never ran (a
          # future `if:` evaluating false, or a needs-skip from an upstream failure)
          # must NOT pass the gate silently.
          if echo "$results" | grep -qE '"(failure|cancelled|skipped)"'; then
            echo "Quality gate failed. Job results: $results"
            exit 1
          fi
          echo "All quality gates passed."

  # ─────────────────────────────────────────────────────────────────────────────
  # CI Complete — single required status check covering the whole pipeline.
  # Set "CI Complete" as the required check in branch protection settings.
  # ─────────────────────────────────────────────────────────────────────────────
  ci-complete:
    name: CI Complete
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [quality-gate]
    if: always()
    steps:
      - name: Check pipeline passed
        run: |
          results='${{ toJson(needs.*.result) }}'
          if echo "$results" | grep -qE '"(failure|cancelled|skipped)"'; then
            echo "CI pipeline failed. Job results: $results"
            exit 1
          fi
          echo "All CI stages complete."
